<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AgentZon Search</title>
</head>
<body>
  <h1>AgentZon Search</h1>
  <form method="post" action="{{ search_path or '/iface' }}">
    <label>Text <input type="text" name="text" value="{{ criteria.text if criteria else '' }}"></label>
    <label>Category <input type="text" name="category" value="{{ criteria.category if criteria else '' }}"></label>
    <label>Brand <input type="text" name="brand" value="{{ criteria.brand if criteria else '' }}"></label>
    <label>Min price <input type="number" step="0.01" name="min_price" value="{{ criteria.min_price if criteria and criteria.min_price is not none else '' }}"></label>
    <label>Max price <input type="number" step="0.01" name="max_price" value="{{ criteria.max_price if criteria and criteria.max_price is not none else '' }}"></label>
    <button type="submit">Search</button>
  </form>

  {% if products %}
  <h2>Results</h2>
  <form method="post" action="{{ compra_url }}">
    {% for product in products %}
    <article>
      <label>
        <input type="checkbox" name="selected_product_ids" value="{{ product.product_id }}">
        <strong>{{ product.name }}</strong>
      </label>
      <div>{{ product.description }}</div>
      <div>{{ product.brand }} | {{ product.category }} | {{ product.price }}</div>
    </article>
    {% endfor %}
    <button type="submit">Buy selected products</button>
  </form>
  {% endif %}
</body>
</html>
